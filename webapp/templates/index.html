<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AegisBank — Loan Assessment</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a class="nav-brand" href="/">
        <div class="nav-logo">A</div>
        <span class="nav-name">AegisBank</span>
      </a>
      <ul class="nav-links">
        <li><a href="/" class="active">Assessment</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="#">History</a></li>
        <li><a href="#">Reports</a></li>
      </ul>
      <div class="nav-actions">
        <div class="nav-badge" title="Notifications">🔔</div>
        <div class="nav-badge" title="Account">👤</div>
      </div>
    </nav>

    <div class="page-wrapper">
      <!-- HERO -->
      <div class="hero-strip">
        <div class="hero-eyebrow">⚡ AI Risk Engine v2.4</div>
        <h1 class="hero-title">Loan Default<br />Prediction</h1>
      </div>

      <div class="content-area">
        <form method="POST" action="/predict" class="loan-form">
          <div class="form-section">
            <h3>Loan Details</h3>

            <div class="form-group">
              <label for="loan_amount">Loan Amount ($)</label>
              <input
                type="number"
                id="loan_amount"
                name="loan_amount"
                required
                value="5000"
                min="0"
                step="100"
              />
            </div>

            <div class="form-group">
              <label for="int_rate">Interest Rate (%)</label>
              <input
                type="number"
                id="int_rate"
                name="int_rate"
                required
                value="12"
                min="0"
                max="30"
                step="0.1"
              />
            </div>

            <div class="form-group">
              <label for="term">Loan Term</label>
              <select id="term" name="term" required>
                <option value="36_months">36 Months</option>
                <option value="60_months" selected>60 Months</option>
              </select>
            </div>

            <div class="form-group">
              <label for="purpose">Loan Purpose</label>
              <select id="purpose" name="purpose" required>
                <option value="debt_consolidation" selected>
                  Debt Consolidation
                </option>
                <option value="credit_card">Credit Card</option>
                <option value="home_improvement">Home Improvement</option>
                <option value="major_purchase">Major Purchase</option>
                <option value="medical">Medical</option>
                <option value="moving">Moving</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-section">
            <h3>Financial Information</h3>

            <div class="form-group">
              <label for="income">Annual Income ($)</label>
              <input
                type="number"
                id="income"
                name="income"
                required
                value="50000"
                min="0"
                step="1000"
              />
            </div>

            <div class="form-group">
              <label for="dti">Debt-to-Income Ratio</label>
              <input
                type="number"
                id="dti"
                name="dti"
                required
                value="0.3"
                min="0"
                max="1"
                step="0.01"
              />
            </div>

            <div class="form-group">
              <label for="credit_score">Credit Score</label>
              <input
                type="number"
                id="credit_score"
                name="credit_score"
                required
                value="700"
                min="300"
                max="850"
              />
            </div>

            <div class="form-group">
              <label for="revol_bal">Revolving Balance ($)</label>
              <input
                type="number"
                id="revol_bal"
                name="revol_bal"
                value="0"
                min="0"
                step="100"
              />
            </div>

            <div class="form-group">
              <label for="revol_util">Revolving Utilization (%)</label>
              <input
                type="number"
                id="revol_util"
                name="revol_util"
                value="30"
                min="0"
                max="100"
                step="1"
              />
            </div>
          </div>

          <div class="form-section">
            <h3>Credit History</h3>

            <div class="form-group">
              <label for="open_acc">Open Accounts</label>
              <input
                type="number"
                id="open_acc"
                name="open_acc"
                value="5"
                min="0"
                step="1"
              />
            </div>

            <div class="form-group">
              <label for="total_acc">Total Accounts</label>
              <input
                type="number"
                id="total_acc"
                name="total_acc"
                value="10"
                min="0"
                step="1"
              />
            </div>

            <div class="form-group">
              <label for="delinq_2yrs">Delinquencies (2 years)</label>
              <input
                type="number"
                id="delinq_2yrs"
                name="delinq_2yrs"
                value="0"
                min="0"
                step="1"
              />
            </div>

            <div class="form-group">
              <label for="inq_last_6mths">Inquiries (Last 6 Months)</label>
              <input
                type="number"
                id="inq_last_6mths"
                name="inq_last_6mths"
                value="0"
                min="0"
                step="1"
              />
            </div>
          </div>

          <div class="form-section">
            <h3>Personal Information</h3>

            <div class="form-group">
              <label for="emp_length">Employment Length</label>
              <select id="emp_length" name="emp_length" required>
                <option value="<1_year">Less than 1 year</option>
                <option value="1_year">1 year</option>
                <option value="2_years">2 years</option>
                <option value="3_years">3 years</option>
                <option value="4_years">4 years</option>
                <option value="5_years" selected>5 years</option>
                <option value="6_years">6 years</option>
                <option value="7_years">7 years</option>
                <option value="8_years">8 years</option>
                <option value="9_years">9 years</option>
                <option value="10+_years">10+ years</option>
              </select>
            </div>

            <div class="form-group">
              <label for="home_ownership">Home Ownership</label>
              <select id="home_ownership" name="home_ownership" required>
                <option value="MORTGAGE" selected>Mortgage</option>
                <option value="OWN">Own</option>
                <option value="RENT">Rent</option>
              </select>
            </div>

            <div class="form-group">
              <label for="addr_state">State</label>
              <select id="addr_state" name="addr_state" required>
                <option value="CA" selected>California</option>
                <option value="TX">Texas</option>
                <option value="NY">New York</option>
                <option value="FL">Florida</option>
                <option value="IL">Illinois</option>
              </select>
            </div>

            <div class="form-group">
              <label for="verification_status">Verification Status</label>
              <select
                id="verification_status"
                name="verification_status"
                required
              >
                <option value="Verified" selected>Verified</option>
                <option value="Source_Verified">Source Verified</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn-submit">🔍 Assess Risk</button>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
