<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AegisBank — Loan Assessment</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a class="nav-brand" href="/">
        <div class="nav-logo">A</div>
        <span class="nav-name">AegisBank</span>
      </a>
      <ul class="nav-links">
        <li><a href="/" class="active">Assessment</a></li>
        <li><a href="/dashboard">Dashboard</a></li>
      </ul>
    </nav>

    <div class="page-wrapper">
      <!-- HERO -->
      <div class="hero-strip">
        <div class="hero-eyebrow">⚡ AI Risk Engine v2.4</div>
        <h1 class="hero-title">Loan Default Prediction</h1>
      </div>

      <div class="content-area">
        <form method="POST" action="/predict" class="loan-form">
          <div class="form-section">
            <h3>📋 Loan Details</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Loan Amount ($)</label>
                <input type="number" name="loan_amnt" required value="5000" min="500" step="100">
              </div>
              <div class="form-group">
                <label>Term</label>
                <select name="term" required>
                  <option value="36_months">36 Months</option>
                  <option value="60_months" selected>60 Months</option>
                </select>
              </div>
              <div class="form-group">
                <label>Interest Rate (%)</label>
                <input type="number" name="int_rate" required value="12" min="0" max="30" step="0.1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Monthly Installment ($)</label>
                <input type="number" name="installment" required value="200" min="0" step="10">
              </div>
              <div class="form-group">
                <label>Purpose</label>
                <select name="purpose" required>
                  <option value="debt_consolidation" selected>Debt Consolidation</option>
                  <option value="credit_card">Credit Card</option>
                  <option value="home_improvement">Home Improvement</option>
                  <option value="major_purchase">Major Purchase</option>
                  <option value="medical">Medical</option>
                  <option value="moving">Moving</option>
                  <option value="vacation">Vacation</option>
                  <option value="wedding">Wedding</option>
                  <option value="house">House</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>💰 Financial Information</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Annual Income ($)</label>
                <input type="number" name="annual_inc" required value="50000" min="0" step="1000">
              </div>
              <div class="form-group">
                <label>Debt-to-Income Ratio</label>
                <input type="number" name="dti" required value="0.3" min="0" max="1" step="0.01">
              </div>
              <div class="form-group">
                <label>FICO Score (Low)</label>
                <input type="number" name="fico_range_low" required value="700" min="300" max="850">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>FICO Score (High)</label>
                <input type="number" name="fico_range_high" required value="710" min="300" max="850">
              </div>
              <div class="form-group">
                <label>Revolving Balance ($)</label>
                <input type="number" name="revol_bal" value="0" min="0" step="100">
              </div>
              <div class="form-group">
                <label>Revolving Utilization (%)</label>
                <input type="number" name="revol_util" value="30" min="0" max="100" step="1">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>📊 Credit History</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Open Accounts</label>
                <input type="number" name="open_acc" value="5" min="0" step="1">
              </div>
              <div class="form-group">
                <label>Total Accounts</label>
                <input type="number" name="total_acc" value="10" min="0" step="1">
              </div>
              <div class="form-group">
                <label>Delinquencies (2 yrs)</label>
                <input type="number" name="delinq_2yrs" value="0" min="0" step="1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Inquiries (Last 6 mo)</label>
                <input type="number" name="inq_last_6mths" value="0" min="0" step="1">
              </div>
              <div class="form-group">
                <label>Public Records</label>
                <input type="number" name="pub_rec" value="0" min="0" step="1">
              </div>
              <div class="form-group">
                <label>Bankruptcies</label>
                <input type="number" name="pub_rec_bankruptcies" value="0" min="0" step="1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Tax Liens</label>
                <input type="number" name="tax_liens" value="0" min="0" step="1">
              </div>
              <div class="form-group">
                <label>Collections (12 mo)</label>
                <input type="number" name="collections_12_mths_ex_med" value="0" min="0" step="1">
              </div>
              <div class="form-group">
                <label>Accounts Now Delinq</label>
                <input type="number" name="acc_now_delinq" value="0" min="0" step="1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Total Collection Amt ($)</label>
                <input type="number" name="tot_coll_amt" value="0" min="0" step="100">
              </div>
              <div class="form-group">
                <label>Total Current Balance ($)</label>
                <input type="number" name="tot_cur_bal" value="0" min="0" step="100">
              </div>
              <div class="form-group">
                <label>Avg Current Balance ($)</label>
                <input type="number" name="avg_cur_bal" value="0" min="0" step="100">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>BC Open to Buy ($)</label>
                <input type="number" name="bc_open_to_buy" value="0" min="0" step="100">
              </div>
              <div class="form-group">
                <label>BC Utilization (%)</label>
                <input type="number" name="bc_util" value="0" min="0" max="100" step="1">
              </div>
              <div class="form-group">
                <label>Num Active BC</label>
                <input type="number" name="num_actv_bc_tl" value="2" min="0" step="1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Num Revolving Accts</label>
                <input type="number" name="num_rev_accts" value="5" min="0" step="1">
              </div>
              <div class="form-group">
                <label>% BC >75%</label>
                <input type="number" name="percent_bc_gt_75" value="25" min="0" max="100" step="1">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>👤 Personal Information</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Grade</label>
                <select name="grade" required>
                  <option value="A">A</option>
                  <option value="B" selected>B</option>
                  <option value="C">C</option>
                  <option value="D">D</option>
                  <option value="E">E</option>
                  <option value="F">F</option>
                  <option value="G">G</option>
                </select>
              </div>
              <div class="form-group">
                <label>Sub Grade</label>
                <select name="sub_grade" required>
                  <option value="A1">A1</option>
                  <option value="A2">A2</option>
                  <option value="A3">A3</option>
                  <option value="A4">A4</option>
                  <option value="A5">A5</option>
                  <option value="B1" selected>B1</option>
                  <option value="B2">B2</option>
                  <option value="B3">B3</option>
                  <option value="B4">B4</option>
                  <option value="B5">B5</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Employment Length</label>
                <select name="emp_length" required>
                  <option value="<1_year">Less than 1 year</option>
                  <option value="1_year">1 year</option>
                  <option value="2_years">2 years</option>
                  <option value="3_years">3 years</option>
                  <option value="4_years">4 years</option>
                  <option value="5_years" selected>5 years</option>
                  <option value="10+_years">10+ years</option>
                </select>
              </div>
              <div class="form-group">
                <label>Home Ownership</label>
                <select name="home_ownership" required>
                  <option value="MORTGAGE" selected>Mortgage</option>
                  <option value="OWN">Own</option>
                  <option value="RENT">Rent</option>
                </select>
              </div>
              <div class="form-group">
                <label>Verification Status</label>
                <select name="verification_status" required>
                  <option value="Verified" selected>Verified</option>
                  <option value="Source_Verified">Source Verified</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Address State</label>
                <select name="addr_state" required>
                  <option value="CA" selected>California</option>
                  <option value="TX">Texas</option>
                  <option value="NY">New York</option>
                  <option value="FL">Florida</option>
                  <option value="IL">Illinois</option>
                  <option value="PA">Pennsylvania</option>
                  <option value="OH">Ohio</option>
                  <option value="GA">Georgia</option>
                  <option value="NC">North Carolina</option>
                  <option value="MI">Michigan</option>
                </select>
              </div>
              <div class="form-group">
                <label>Initial List Status</label>
                <select name="initial_list_status" required>
                  <option value="w" selected>Whole</option>
                  <option value="f">Fractional</option>
                </select>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-submit">🔍 Assess Loan Risk</button>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
