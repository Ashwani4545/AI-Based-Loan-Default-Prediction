<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction Result — AegisBank</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <nav class="nav">
      <a class="nav-brand" href="/">
        <div class="nav-logo">A</div>
        <span class="nav-name">AegisBank</span>
      </a>
    </nav>

    <div class="page-wrapper">
      <div class="hero-strip">
        <div class="hero-eyebrow">✅ Assessment Complete</div>
        <h1 class="hero-title">Risk Analysis Result</h1>
      </div>

      <div class="content-area" style="max-width: 600px; margin: 0 auto">
        <div
          class="card"
          style="border: 3px solid {{ color }}; background: rgba(0,0,0,0.02);"
        >
          <div style="text-align: center; padding: 40px 20px">
            <div style="font-size: 72px; margin-bottom: 20px">
              {{ risk_level }}
            </div>

            <div style="margin: 30px 0">
              <div style="font-size: 14px; color: #666; margin-bottom: 10px">
                DEFAULT PROBABILITY
              </div>
              <div
                style="font-size: 48px; font-weight: bold; color: {{ color }};"
              >
                {{ probability }}%
              </div>
            </div>

            <div
              style="
                margin: 30px 0;
                padding: 20px;
                background: rgba(0, 0, 0, 0.05);
                border-radius: 8px;
              "
            >
              <div style="font-size: 14px; color: #666; margin-bottom: 5px">
                PREDICTION
              </div>
              <div style="font-size: 24px; font-weight: bold">
                {% if prediction == 0 %} ✅ LIKELY TO REPAY {% else %} ⚠️
                DEFAULT RISK {% endif %}
              </div>
            </div>

            <div
              style="
                margin-top: 40px;
                display: flex;
                gap: 10px;
                justify-content: center;
              "
            >
              <a
                href="/"
                class="btn-submit"
                style="text-decoration: none; display: inline-block"
                >← New Assessment</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
