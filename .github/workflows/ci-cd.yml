name: CI/CD Pipeline - Loan Default App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 4. Basic Test (App runs)
      - name: Run Basic Test
        run: |
          python -c "import app"

      # 5. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t loan-default-app .

  push-to-dockerhub:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.ashwani454545 }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Image
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/loan-default-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/loan-default-app:latest
